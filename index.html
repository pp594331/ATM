<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureVault ATM</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 40%, #2d1b69 100%);
            overflow: hidden;
        }

        /* Animated background particles */
        .bg-effects {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }
        .orb:nth-child(1) { width: 400px; height: 400px; background: #6c63ff; top: -100px; left: -100px; animation-delay: 0s; }
        .orb:nth-child(2) { width: 300px; height: 300px; background: #00d2ff; bottom: -80px; right: -80px; animation-delay: 2s; }
        .orb:nth-child(3) { width: 200px; height: 200px; background: #ff6b6b; top: 50%; left: 60%; animation-delay: 4s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        .login-wrapper {
            position: relative; z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0; transform: translateY(40px);
        }
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 48px 40px;
            width: 400px;
            max-width: 90vw;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .bank-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #6c63ff, #00d2ff);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 32px;
            box-shadow: 0 10px 30px rgba(108,99,255,0.3);
            animation: pulse 3s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(108,99,255,0.3); }
            50% { box-shadow: 0 10px 40px rgba(108,99,255,0.5); }
        }

        .login-card h2 {
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .login-card .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        .input-group .icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            font-size: 16px; opacity: 0.5;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 46px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            font-size: 15px;
            color: #fff;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input::placeholder { color: rgba(255,255,255,0.35); }

        .input-group input:focus {
            border-color: #6c63ff;
            background: rgba(108,99,255,0.08);
            box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c63ff, #4834d4);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(108,99,255,0.4);
        }

        .login-btn:active { transform: translateY(0); }

        .login-btn::after {
            content: '';
            position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }
        .login-btn:hover::after { left: 100%; }

        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 28px;
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .feature-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .feature-item span:first-child { font-size: 18px; }
        .feature-item span:last-child { font-size: 11px; color: rgba(255,255,255,0.4); }

        .footer-text {
            margin-top: 24px;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
        }
    </style>
</head>
<body>

    <div class="bg-effects">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="bank-icon">&#x1F3E6;</div>
            <h2>SecureVault ATM</h2>
            <p class="subtitle">Enter your credentials to access your account</p>

            <form method="POST">
                <div class="input-group">
                    <span class="icon">&#x1F464;</span>
                    <input type="text" name="acc" placeholder="Account Number" required autocomplete="off">
                </div>
                <div class="input-group">
                    <span class="icon">&#x1F512;</span>
                    <input type="password" name="pin" placeholder="PIN" required autocomplete="off">
                </div>
                <button class="login-btn" type="submit">Sign In &rarr;</button>
            </form>

            <div class="features">
                <div class="feature-item"><span>&#x1F6E1;</span><span>Secure</span></div>
                <div class="feature-item"><span>&#x26A1;</span><span>Fast</span></div>
                <div class="feature-item"><span>&#x1F4B3;</span><span>Easy</span></div>
                <div class="feature-item"><span>&#x1F310;</span><span>24/7</span></div>
            </div>

            <div class="footer-text">SecureVault Banking &copy; 2026 &bull; Encrypted Connection</div>
        </div>
    </div>

</body>
</html>
